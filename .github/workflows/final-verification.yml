name: Final Verification Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  final-verification:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Auto-pass for automated aggregation PR
        if: github.head_ref == 'automation/aggregation-output'
        run: |
          echo "PR from automation/aggregation-output branch — skipping PR check verification."
          exit 0

      - name: Checkout repo
        if: github.head_ref != 'automation/aggregation-output'
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        if: github.head_ref != 'automation/aggregation-output'
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Wait for all required checks to finish and succeed
        if: github.head_ref != 'automation/aggregation-output'
        id: wait-checks
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Use the actual check names you care about
          PDF_CHECKS=$'check_files\ncheck-file-case-sensitivity\nsubmission_check\nverification'
          GDS_CHECKS=$'check_files\ncheck-file-case-sensitivity\nsubmission_check\nverification'
          PYTHON_CHECKS=$'run-python'


          MAX_RETRIES=10
          SLEEP_SECONDS=30

          ALL_REQUIRED=$(printf '%s\n' "$PDF_CHECKS" "$GDS_CHECKS" "$PYTHON_CHECKS" | sort -u)

          for ((i=1;i<=MAX_RETRIES;i++)); do
            echo "Fetching checks for PR #$PR_NUMBER (attempt $i/$MAX_RETRIES)..."

            CHECKS=$(gh pr checks "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --json name,state \
              -q '.[] | "\(.name)|\(.state)"')

            if [ -z "$CHECKS" ]; then
              echo "No checks reported yet."
            else
              echo "Current checks:"
              printf '%s\n' "$CHECKS"
            fi

            PRESENT_CHECKS=""
            while IFS= read -r req; do
              [ -z "$req" ] && continue
              if printf '%s\n' "$CHECKS" | cut -d'|' -f1 | grep -Fxq "$req"; then
                PRESENT_CHECKS+=$'\n'"$req"
              fi
            done <<< "$ALL_REQUIRED"

            PRESENT_CHECKS=$(printf '%s\n' "$PRESENT_CHECKS" | sort -u)

            if [ -z "$PRESENT_CHECKS" ]; then
              if [ "$i" -eq "$MAX_RETRIES" ]; then
                echo "No relevant checks present for this PR after $MAX_RETRIES attempts. Failing final verification."
                exit 1
              fi
              echo "No relevant checks present yet. Waiting for other workflows to start... ($i/$MAX_RETRIES)"
              sleep "$SLEEP_SECONDS"
              continue
            fi

            echo "Present required checks on this PR:"
            printf '%s\n' "$PRESENT_CHECKS"

            all_success=1

            while IFS= read -r req; do
              [ -z "$req" ] && continue
              echo "Evaluating required check: '$req'"

              while IFS= read -r check; do
                [ -z "$check" ] && continue
                name=${check%%|*}
                state=${check##*|}

                # Explicitly ignore this job's own check to avoid deadlock
                if [ "$name" = "$req" ] && [ "$name" != "final-verification" ]; then
                  state_upper=$(echo "$state" | tr '[:lower:]' '[:upper:]')
                  echo "  -> name=$name state=$state_upper"

                  if [ "$state_upper" = "SUCCESS" ]; then
                    echo "  -> OK"
                  elif [ "$state_upper" = "FAILURE" ]; then
                    echo "Required check '$req' failed."
                    exit 1
                  else
                    echo "  -> Not finished (state=$state). Waiting..."
                    all_success=0
                  fi
                fi
              done <<< "$CHECKS"
            done <<< "$PRESENT_CHECKS"

            if [ "$all_success" -eq 1 ]; then
              echo "All present required checks passed."
              exit 0
            fi

            echo "Waiting for present checks to complete... ($i/$MAX_RETRIES)"
            sleep "$SLEEP_SECONDS"
          done

          echo "Timeout waiting for all required checks to complete."
          exit 1

      - name: Success message
        if: success() && github.head_ref != 'automation/aggregation-output'
        run: echo "Final verification check passed. Auto-merge can proceed."
